# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/reference/configuration-reference
version: 2.1

# Define reusable commands
commands:
  install-rust:
    steps:
      - run:
          name: "Install Rust toolchain"
          command: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            source $HOME/.cargo/env
            rustup default stable
            rustc --version && cargo --version

  restore-cargo-cache:
    steps:
      - restore_cache:
          keys:
            - cargo-cache-{{ arch }}-{{ checksum "Cargo.lock" }}
            - cargo-cache-{{ arch }}

  save-cargo-cache:
    steps:
      - save_cache:
          key: cargo-cache-{{ arch }}-{{ checksum "Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git

jobs:
  test-linux:
    docker:
      - image: cimg/rust:latest
    environment:
      RUSTFLAGS: -D warnings
      CARGO_TERM_COLOR: always
    steps:
      - checkout
      - restore-cargo-cache
      - run:
          name: "Build"
          command: cargo build
      - run:
          name: "Run tests"
          command: cargo test
      - save-cargo-cache

  build-musl:
    docker:
      - image: cimg/rust:latest
    steps:
      - checkout
      - restore-cargo-cache
      - run:
          name: "Install musl target"
          command: |
            rustup target add x86_64-unknown-linux-musl
            sudo apt-get update && sudo apt-get install -y musl-tools
      - run:
          name: "Build with musl (static)"
          command: cargo build --release --target x86_64-unknown-linux-musl
      - save-cargo-cache

  test-macos-arm:
    macos:
      xcode: "16.2.0"
    resource_class: macos.m1.medium.gen1
    environment:
      RUSTFLAGS: -D warnings
      CARGO_TERM_COLOR: always
    steps:
      - checkout
      - install-rust
      - restore-cargo-cache
      - run:
          name: "Build"
          command: source $HOME/.cargo/env && cargo build --release
      - run:
          name: "Run tests"
          command: source $HOME/.cargo/env && cargo test
      - run:
          name: "macOS 采集验证"
          command: |
            source $HOME/.cargo/env
            BIN=./target/release/hawk-eye-mem
            OUTPUT=$($BIN --json 2>/dev/null)
            TOTAL=$(echo "$OUTPUT" | python3 -c "import json,sys;d=json.load(sys.stdin);print(d['system']['memory']['total_mb'])")
            echo "macOS Memory: ${TOTAL}MB"
            $BIN --env-fingerprint
            $BIN --suggest-concurrency
      - save-cargo-cache

  test-macos-intel:
    macos:
      xcode: "15.4.0"
    resource_class: macos.x86.medium.gen2
    environment:
      RUSTFLAGS: -D warnings
      CARGO_TERM_COLOR: always
    steps:
      - checkout
      - install-rust
      - restore-cargo-cache
      - run:
          name: "Build"
          command: source $HOME/.cargo/env && cargo build --release
      - run:
          name: "Run tests"
          command: source $HOME/.cargo/env && cargo test
      - run:
          name: "macOS 采集验证"
          command: |
            source $HOME/.cargo/env
            ./target/release/hawk-eye-mem --json | python3 -c "import json,sys;d=json.load(sys.stdin);assert d['system'];assert d['agent_guidance'];print('JSON valid')"
      - save-cargo-cache

workflows:
  build-and-test:
    jobs:
      - test-linux
      - build-musl
      - test-macos-arm
      - test-macos-intel
