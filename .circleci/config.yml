# Use the latest 2.1 version of CircleCI pipeline process engine.
# See: https://circleci.com/docs/reference/configuration-reference
version: 2.1

commands:
  install-rust:
    steps:
      - run:
          name: "Install Rust toolchain"
          command: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            source $HOME/.cargo/env
            rustup default stable
            rustc --version && cargo --version

  restore-cargo-cache:
    steps:
      - restore_cache:
          keys:
            - cargo-cache-{{ arch }}-{{ checksum "Cargo.lock" }}
            - cargo-cache-{{ arch }}

  save-cargo-cache:
    steps:
      - save_cache:
          key: cargo-cache-{{ arch }}-{{ checksum "Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git

jobs:
  test-linux:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    environment:
      RUSTFLAGS: -D warnings
      CARGO_TERM_COLOR: always
    steps:
      - run:
          name: "Checkout code"
          command: |
            git clone --depth 1 https://github.com/qiuhaomem/HawkEye-Mem.git /tmp/repo
            cp -a /tmp/repo/. .
            rm -rf /tmp/repo
      - install-rust
      - restore-cargo-cache
      - run:
          name: "Build"
          command: source $HOME/.cargo/env && cargo build
      - run:
          name: "Run tests"
          command: source $HOME/.cargo/env && cargo test
      - save-cargo-cache

  build-musl:
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - run:
          name: "Checkout code"
          command: |
            git clone --depth 1 https://github.com/qiuhaomem/HawkEye-Mem.git /tmp/repo
            cp -a /tmp/repo/. .
            rm -rf /tmp/repo
      - install-rust
      - restore-cargo-cache
      - run:
          name: "Install musl target"
          command: |
            source $HOME/.cargo/env && rustup target add x86_64-unknown-linux-musl
            sudo apt-get update && sudo apt-get install -y musl-tools
      - run:
          name: "Build with musl (static)"
          command: source $HOME/.cargo/env && cargo build --release --target x86_64-unknown-linux-musl
      - save-cargo-cache

  test-macos-arm:
    macos:
      xcode: "16.2.0"
    resource_class: macos.m1.medium.gen1
    environment:
      RUSTFLAGS: -D warnings
      CARGO_TERM_COLOR: always
    steps:
      - run:
          name: "Checkout code"
          command: |
            git clone --depth 1 https://github.com/qiuhaomem/HawkEye-Mem.git /tmp/repo
            cp -a /tmp/repo/. .
            rm -rf /tmp/repo
      - install-rust
      - restore-cargo-cache
      - run:
          name: "Build"
          command: source $HOME/.cargo/env && cargo build --release
      - run:
          name: "Run tests"
          command: source $HOME/.cargo/env && cargo test
      - run:
          name: "macOS 采集验证"
          command: |
            source $HOME/.cargo/env
            ./target/release/hawk-eye-mem --json | python3 -c "import json,sys;d=json.load(sys.stdin);assert d['system']['memory']['total_mb']>0;print('OK')"
      - save-cargo-cache

# Intel macOS 已移除：CircleCI 免费套餐不支持 macos.x86.medium.gen2
# 见 https://circleci.com/docs/using-macos/ 定价方案说明
# Apple Silicon (M1) runner 正常可用

workflows:
  build-and-test:
    jobs:
      - test-linux
      - build-musl
      - test-macos-arm
