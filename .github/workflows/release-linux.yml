# 秋毫mem · Linux 发布构建
# 只编译 Linux GNU + musl，跑通后上传到 Release

name: Release Linux

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to upload assets to (e.g. v0.4.1)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux-gnu:
    name: Build Linux GNU
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build release
        run: cargo build --release

      - name: Verify binary
        run: |
          BIN=./target/release/hawk-eye-mem
          ls -lh "$BIN"
          file "$BIN"
          "$BIN" --version
          "$BIN" --json > /dev/null 2>&1 && echo "✅ JSON output OK"

      - name: Rename for upload
        run: cp ./target/release/hawk-eye-mem ./hawk-eye-mem-x86_64-linux-gnu

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: ./hawk-eye-mem-x86_64-linux-gnu

  build-linux-musl:
    name: Build Linux musl (static)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + musl target
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq musl-tools

      - name: Build with musl (static)
        run: cargo build --release --target x86_64-unknown-linux-musl
        env:
          CARGO_HOME: ${{ runner.temp }}/cargo-home

      - name: Verify static linking
        run: |
          BIN=./target/x86_64-unknown-linux-musl/release/hawk-eye-mem
          ls -lh "$BIN"
          file "$BIN"
          readelf -l "$BIN" 2>/dev/null | grep -q "INTERP" && echo "⚠️ has INTERP" || echo "✅ statically linked"
          "$BIN" --version

      - name: Rename for upload
        run: cp ./target/x86_64-unknown-linux-musl/release/hawk-eye-mem ./hawk-eye-mem-x86_64-linux-musl

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag }}
          files: ./hawk-eye-mem-x86_64-linux-musl
