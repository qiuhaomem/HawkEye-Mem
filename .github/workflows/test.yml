# 秋毫mem · CI 验证工作流
# 跨平台构建 + 测试 + macOS 实机采集验证
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # === Linux 构建与测试 ===
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test

      - name: Verify JSON output (Schema + fields)
        run: |
          BIN=./target/release/hawk-eye-mem
          OUTPUT=$($BIN --json 2>/dev/null)

          # 验证必填字段存在
          echo "$OUTPUT" | jq -e '.system' > /dev/null && echo '✅ system exists'
          echo "$OUTPUT" | jq -e '.agent_guidance' > /dev/null && echo '✅ agent_guidance exists'

          ACTION=$(echo "$OUTPUT" | jq -r '.agent_guidance.action')
          echo "action=$ACTION"
          case "$ACTION" in
            ok|monitor|reduce_context|abort_safely) echo '✅ action valid' ;;
            *) echo "❌ invalid action: $ACTION"; exit 1 ;;
          esac

          REASON=$(echo "$OUTPUT" | jq -r '.agent_guidance.reason')
          RLEN=${#REASON}
          [ "$RLEN" -le 200 ] && echo "✅ reason length OK ($RLEN chars)" || { echo "❌ reason too long: $RLEN"; exit 1; }

          echo "$OUTPUT" | jq -e '.agent_guidance.pressure' > /dev/null && echo '✅ pressure'
          echo "$OUTPUT" | jq -e '.agent_guidance.confidence' > /dev/null && echo '✅ confidence'
          echo "$OUTPUT" | jq -e '.agent_guidance.estimated_safe_context_window' > /dev/null && echo '✅ estimated_safe_context_window'

      - name: Verify --metric output
        run: |
          BIN=./target/release/hawk-eye-mem
          VAL=$($BIN --metric available_mb 2>/dev/null)
          [[ "$VAL" =~ ^[0-9]+$ ]] && echo "✅ --metric available_mb: $VAL" || { echo "❌ not a number: $VAL"; exit 1; }

          PRS=$($BIN --metric pressure 2>/dev/null)
          [[ "$PRS" =~ ^(low|medium|high|critical)$ ]] && echo "✅ --metric pressure: $PRS" || { echo "❌ invalid pressure: $PRS"; exit 1; }

  # === Linux musl 静态链接验证 ===
  build-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain + musl target
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq musl-tools

      - name: Build with musl (static)
        run: cargo build --release --target x86_64-unknown-linux-musl
        env:
          CARGO_HOME: ${{ runner.temp }}/cargo-home

      - name: Verify static linking
        run: |
          BIN=./target/x86_64-unknown-linux-musl/release/hawk-eye-mem
          ls -lh "$BIN"
          echo "=== file output ==="
          file "$BIN"
          echo "=== ldd check ==="
          ldd "$BIN" 2>&1 || true
          echo "=== readelf check ==="
          readelf -l "$BIN" 2>/dev/null | grep -q "INTERP" && echo "⚠️ has INTERP (dynamically linked)" || echo "✅ no INTERP (statically linked)"
          echo "=== run test ==="
          "$BIN" --version 2>&1 || { echo "❌ execution failed"; exit 1; }

  # === macOS 构建与实机验证 ===
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test

      - name: macOS 实机采集验证（检查误报）
        run: |
          BIN=./target/release/hawk-eye-mem
          OUTPUT=$($BIN --json 2>/dev/null)

          TOTAL=$(echo "$OUTPUT" | jq -r '.system.total_mb')
          AVAIL=$(echo "$OUTPUT" | jq -r '.system.available_mb')
          PERCENT=$(echo "$OUTPUT" | jq -r '.system.used_percent')
          PRESSURE=$(echo "$OUTPUT" | jq -r '.agent_guidance.pressure')
          ACTION=$(echo "$OUTPUT" | jq -r '.agent_guidance.action')
          REASON=$(echo "$OUTPUT" | jq -r '.agent_guidance.reason')

          echo "=== macOS 系统状态 ==="
          echo "  总内存: ${TOTAL}MB"
          echo "  可用:   ${AVAIL}MB"
          echo "  使用率: ${PERCENT}%"
          echo "  压力:   ${PRESSURE}"
          echo "  建议:   ${ACTION}"
          echo "  理由:   ${REASON}"

          # 基础验证
          [ "$TOTAL" -gt 0 ] && echo "✅ total_mb" || { echo "❌ total_mb=0"; exit 1; }
          [ "$AVAIL" -gt 0 ] && echo "✅ available_mb" || { echo "❌ available_mb=0"; exit 1; }

          # 误报检测：正常负载下不应 high/critical
          if [ "$PRESSURE" = "critical" ] || [ "$PRESSURE" = "high" ]; then
            echo "⚠️  警告: macOS 压力偏高 ($PRESSURE)"
            echo "    runner 负载可能较大，需人工确认"
          else
            echo "✅ macOS 压力正常: $PRESSURE"
          fi

          # action 必须是合法值
          case "$ACTION" in
            ok|monitor|reduce_context|abort_safely) echo "✅ action=$ACTION" ;;
            *) echo "❌ invalid action"; exit 1 ;;
          esac

          echo "✅ macOS 采集器运行正常!"

      - name: macOS 首次运行验证
        run: |
          BIN=./target/release/hawk-eye-mem
          TMP_HOME=$(mktemp -d)
          HOME=$TMP_HOME $BIN 2>&1 | tee /tmp/first_run.txt
          echo "---"
          grep -q "No warranty" /tmp/first_run.txt && echo "✅ 免责声明: No warranty"
          grep -q "Use at your own risk" /tmp/first_run.txt && echo "✅ 免责声明: Use at your own risk"
          grep -q "Quick Start" /tmp/first_run.txt && echo "✅ 引导信息: Quick Start"
          rm -rf "$TMP_HOME"

      - name: Upload macOS binary
        uses: actions/upload-artifact@v4
        with:
          name: hawk-eye-mem-macos-arm64
          path: ./target/release/hawk-eye-mem
          compression-level: 0
